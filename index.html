<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Power Up! — Solar, Batteries &amp; Home AI Clusters | TAFE NSW</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
<script>
  (() => {
    const param = new URLSearchParams(window.location.search).get("scoutTheme");
    const theme =
      param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<style>
:root {
  color-scheme: light;
  --cp-bg: #f7f4ef;
  --cp-bg-elevated: #fcfbf8;
  --cp-surface: #ffffff;
  --cp-surface-soft: #f5f5f5;
  --cp-border: #dedede;
  --cp-border-strong: #919191;
  --cp-text: #242424;
  --cp-text-muted: #5c5c5c;
  --cp-text-soft: #6f6f6f;
  --cp-accent: #b11f4b;
  --cp-accent-hover: #9a1a41;
  --cp-accent-soft: rgba(177, 31, 75, 0.08);
  --cp-accent-fg: #ffffff;
  --cp-success: #16a34a;
  --cp-danger: #dc2626;
  --cp-warning: #f59e0b;
  --cp-link: #0078d4;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
  --cp-overlay: rgba(255, 255, 255, 0.8);
  --cp-panel: rgba(255, 255, 255, 0.86);
  --cp-panel-strong: rgba(255, 255, 255, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.55);
  --cp-highlight: rgba(177, 31, 75, 0.12);
}
html[data-theme="dark"] {
  color-scheme: dark;
  --cp-bg: #3d3b3a;
  --cp-bg-elevated: #343231;
  --cp-surface: #292929;
  --cp-surface-soft: #2e2e2e;
  --cp-border: #474747;
  --cp-border-strong: #5f5f5f;
  --cp-text: #dedede;
  --cp-text-muted: #919191;
  --cp-text-soft: #b0b0b0;
  --cp-accent: #fd8ea1;
  --cp-accent-hover: #fb7b91;
  --cp-accent-soft: rgba(253, 142, 161, 0.14);
  --cp-accent-fg: #1a1a1a;
  --cp-success: #4ade80;
  --cp-danger: #f87171;
  --cp-warning: #fbbf24;
  --cp-link: #4da6ff;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
  --cp-overlay: rgba(41, 41, 41, 0.88);
  --cp-panel: rgba(41, 41, 41, 0.72);
  --cp-panel-strong: rgba(41, 41, 41, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.04);
  --cp-highlight: rgba(253, 142, 161, 0.12);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--cp-bg);
  color: var(--cp-text);
  font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.5;
  min-height: 100vh;
}
.mono { font-family: Consolas, "Courier New", Courier, monospace; }

.wrap { max-width: 920px; margin: 0 auto; padding: 0 18px 64px; }

/* Header */
header.app {
  position: sticky; top: 0; z-index: 20;
  background: var(--cp-panel-strong);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--cp-border);
}
.head-inner { max-width: 920px; margin: 0 auto; padding: 12px 18px; }
.head-row { display: flex; align-items: center; gap: 12px; }
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.02rem; }
.brand .logo {
  width: 34px; height: 34px; border-radius: 10px;
  display: grid; place-items: center; font-size: 1.05rem;
  background: var(--cp-accent); color: var(--cp-accent-fg);
  box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
}
.brand small { display: block; font-weight: 500; font-size: 0.7rem; color: var(--cp-text-muted); letter-spacing: .04em; }
.spacer { flex: 1; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 999px;
  border: 1px solid var(--cp-border);
  background: var(--cp-surface); font-size: 0.82rem; font-weight: 600;
}
.chip b { color: var(--cp-accent); }
.icon-btn {
  width: 34px; height: 34px; border-radius: 10px; cursor: pointer;
  border: 1px solid var(--cp-border); background: var(--cp-surface);
  color: var(--cp-text); font-size: 1rem; display: grid; place-items: center;
}
.icon-btn:hover { border-color: var(--cp-border-strong); }
.progress {
  margin-top: 10px; height: 7px; border-radius: 999px;
  background: var(--cp-surface-soft); border: 1px solid var(--cp-border); overflow: hidden;
}
.progress > span {
  display: block; height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--cp-accent), var(--cp-accent-hover));
  transition: width .45s cubic-bezier(.4,0,.2,1);
}
.stage-label { font-size: 0.74rem; color: var(--cp-text-muted); margin-top: 6px; letter-spacing: .03em; }

/* Cards */
.card {
  background: var(--cp-surface);
  border: 1px solid var(--cp-border);
  border-radius: 16px;
  padding: 26px;
  margin-top: 22px;
  box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
  animation: rise .35s ease;
}
@keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.stage-tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 0.78rem; font-weight: 700; letter-spacing: .03em;
  color: var(--cp-accent);
  background: var(--cp-accent-soft);
  padding: 5px 12px; border-radius: 999px; margin-bottom: 14px;
}
h1 { font-size: 1.7rem; margin: 0 0 8px; line-height: 1.2; }
h2.q-text { font-size: 1.28rem; margin: 4px 0 18px; line-height: 1.3; }
.q-progress { font-size: 0.78rem; color: var(--cp-text-muted); font-weight: 600; margin-bottom: 6px; }
p.lede { color: var(--cp-text-muted); font-size: 1.02rem; margin: 0 0 6px; }

/* Buttons */
.btn-primary, .btn-ghost {
  font-family: inherit; font-size: 0.95rem; font-weight: 600;
  padding: 11px 22px; border-radius: 0.625rem; cursor: pointer;
  border: 1px solid transparent; transition: background .15s, transform .05s;
}
.btn-primary { background: var(--cp-accent); color: var(--cp-accent-fg); }
.btn-primary:hover { background: var(--cp-accent-hover); }
.btn-primary:active { transform: translateY(1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-ghost { background: var(--cp-surface); border-color: var(--cp-border); color: var(--cp-text); }
.btn-ghost:hover { border-color: var(--cp-border-strong); }
.row-end { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.row-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }

/* Options */
.options { display: grid; gap: 11px; }
.option {
  text-align: left; font-family: inherit; font-size: 0.98rem;
  padding: 14px 16px; border-radius: 0.625rem; cursor: pointer;
  border: 1px solid var(--cp-border); background: var(--cp-surface-soft);
  color: var(--cp-text); display: flex; gap: 11px; align-items: center;
  transition: border-color .12s, background .12s, transform .05s;
}
.option:hover:not(:disabled) { border-color: var(--cp-accent); background: var(--cp-accent-soft); }
.option:active:not(:disabled) { transform: translateY(1px); }
.option .key {
  flex: none; width: 26px; height: 26px; border-radius: 7px;
  display: grid; place-items: center; font-weight: 700; font-size: 0.82rem;
  background: var(--cp-surface); border: 1px solid var(--cp-border);
}
.option.correct { border-color: var(--cp-success); background: color-mix(in srgb, var(--cp-success) 12%, var(--cp-surface)); }
.option.correct .key { background: var(--cp-success); color: #fff; border-color: var(--cp-success); }
.option.wrong { border-color: var(--cp-danger); background: color-mix(in srgb, var(--cp-danger) 12%, var(--cp-surface)); }
.option.wrong .key { background: var(--cp-danger); color: #fff; border-color: var(--cp-danger); }
.option:disabled { cursor: default; }

/* Feedback */
.feedback {
  margin-top: 16px; padding: 14px 16px; border-radius: 0.625rem;
  font-size: 0.94rem; border: 1px solid var(--cp-border);
  animation: rise .25s ease;
}
.feedback.ok { border-color: var(--cp-success); background: color-mix(in srgb, var(--cp-success) 10%, var(--cp-surface)); }
.feedback.bad { border-color: var(--cp-danger); background: color-mix(in srgb, var(--cp-danger) 10%, var(--cp-surface)); }
.feedback strong { display: inline; }

/* Order challenge */
.slots { display: grid; gap: 9px; margin: 4px 0 18px; }
.slot {
  display: flex; align-items: center; gap: 12px; min-height: 52px;
  border: 1.5px dashed var(--cp-border-strong); border-radius: 0.625rem;
  padding: 8px 12px; background: var(--cp-surface-soft);
}
.slot .num {
  flex: none; width: 28px; height: 28px; border-radius: 50%;
  display: grid; place-items: center; font-weight: 700; font-size: 0.85rem;
  background: var(--cp-accent); color: var(--cp-accent-fg);
}
.slot.filled { border-style: solid; border-color: var(--cp-border); background: var(--cp-surface); }
.slot.ok { border-color: var(--cp-success); background: color-mix(in srgb, var(--cp-success) 10%, var(--cp-surface)); }
.slot.no { border-color: var(--cp-danger); background: color-mix(in srgb, var(--cp-danger) 10%, var(--cp-surface)); }
.chip-item {
  font-family: inherit; font-size: 0.93rem; font-weight: 600;
  padding: 9px 14px; border-radius: 0.625rem; cursor: pointer;
  border: 1px solid var(--cp-border); background: var(--cp-surface); color: var(--cp-text);
  transition: border-color .12s, transform .05s;
}
.chip-item:hover { border-color: var(--cp-accent); }
.chip-item:active { transform: translateY(1px); }
.slot .chip-item { background: var(--cp-accent-soft); border-color: var(--cp-accent); flex: 1; cursor: pointer; }
.bank { display: flex; flex-wrap: wrap; gap: 9px; }
.bank-label, .group-label { font-size: 0.8rem; font-weight: 700; color: var(--cp-text-muted); margin: 6px 0; letter-spacing: .03em; text-transform: uppercase; }

/* Sizing */
.control { margin: 18px 0; }
.control .lab { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.control .lab .name { font-weight: 600; }
.control .lab .val { font-weight: 700; color: var(--cp-accent); font-size: 1.05rem; }
input[type=range] {
  width: 100%; accent-color: var(--cp-accent); height: 24px; cursor: pointer;
}
.target-hint { font-size: 0.82rem; margin-top: 6px; font-weight: 600; }
.target-hint.ok { color: var(--cp-success); }
.target-hint.no { color: var(--cp-danger); }
.readout {
  margin: 6px 0 4px; padding: 16px; border-radius: 0.625rem;
  background: var(--cp-bg-elevated); border: 1px solid var(--cp-border);
  font-size: 0.96rem;
}
.readout .big { font-size: 1.35rem; font-weight: 700; }
.bar { height: 10px; border-radius: 999px; background: var(--cp-surface-soft); border: 1px solid var(--cp-border); overflow: hidden; margin-top: 8px; }
.bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--cp-accent), var(--cp-accent-hover)); transition: width .3s; }
.warn-note {
  margin-top: 10px; font-size: 0.86rem; color: var(--cp-warning); font-weight: 600;
}

/* Home / journey */
.hero { text-align: center; padding: 8px 0 4px; }
.hero .badge-row { display: flex; justify-content: center; gap: 10px; font-size: 2.1rem; margin-bottom: 6px; }
.journey { display: grid; gap: 14px; margin: 22px 0 8px; }
@media (min-width: 680px) { .journey { grid-template-columns: repeat(3, 1fr); } }
.stop {
  border: 1px solid var(--cp-border); border-radius: 14px; padding: 18px;
  background: var(--cp-surface-soft); position: relative;
}
.stop .n { font-size: 0.72rem; font-weight: 700; color: var(--cp-text-muted); letter-spacing: .05em; }
.stop .em { font-size: 1.9rem; margin: 4px 0 6px; }
.stop h3 { margin: 0 0 6px; font-size: 1.05rem; }
.stop p { margin: 0; font-size: 0.86rem; color: var(--cp-text-muted); }
.facts { display: grid; gap: 8px; margin: 16px 0 4px; }
.fact { display: flex; gap: 10px; align-items: flex-start; font-size: 0.92rem; color: var(--cp-text-muted); }
.fact .f-em { flex: none; }

/* Module complete + final */
.center { text-align: center; }
.medal { font-size: 4rem; margin: 6px 0; animation: pop .5s ease; }
@keyframes pop { 0% { transform: scale(.3); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
.badge-earned {
  display: inline-flex; align-items: center; gap: 9px; margin: 6px;
  padding: 9px 16px; border-radius: 999px; font-weight: 700;
  background: var(--cp-accent-soft); color: var(--cp-accent); border: 1px solid var(--cp-accent);
}
.cert {
  border: 2px solid var(--cp-accent); border-radius: 16px; padding: 30px;
  background: var(--cp-bg-elevated); text-align: center; margin-top: 18px;
}
.cert .seal { font-size: 3rem; }
.cert h2 { margin: 6px 0; }
.cert .score-big { font-size: 3rem; font-weight: 800; color: var(--cp-accent); margin: 6px 0; }
.grade { font-size: 1.2rem; font-weight: 700; }
.muted { color: var(--cp-text-muted); }
.tag-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
.disclaimer { font-size: 0.78rem; color: var(--cp-text-soft); margin-top: 24px; text-align: center; line-height: 1.5; }
.kbd { font-family: Consolas, monospace; background: var(--cp-surface-soft); border: 1px solid var(--cp-border); border-radius: 5px; padding: 1px 6px; font-size: 0.85em; }
</style>
</head>
<body>
<header class="app">
  <div class="head-inner">
    <div class="head-row">
      <div class="brand">
        <span class="logo">⚡</span>
        <span>Power Up!<small>TAFE NSW · Renewables &amp; Home AI Infrastructure</small></span>
      </div>
      <span class="spacer"></span>
      <span class="chip" id="scoreChip" hidden>⭐ <b id="scoreVal">0</b></span>
      <button class="icon-btn" id="themeBtn" title="Toggle light/dark">🌗</button>
    </div>
    <div class="progress"><span id="progFill"></span></div>
    <div class="stage-label" id="stageLabel">Ready to start</div>
  </div>
</header>

<div class="wrap">
  <main id="screen"></main>
</div>

<script>
"use strict";
const screen = document.getElementById('screen');
const scoreVal = document.getElementById('scoreVal');
const scoreChip = document.getElementById('scoreChip');
const progFill = document.getElementById('progFill');
const stageLabel = document.getElementById('stageLabel');

document.getElementById('themeBtn').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
});

/* ---------------- Curriculum data ---------------- */
const MODULES = [
  {
    title: "Solar & Battery Install",
    icon: "☀️",
    badge: { em: "☀️", name: "Solar Sparky" },
    stages: [
      {
        type: "quiz",
        title: "Site Assessment",
        questions: [
          {
            q: "In NSW (Southern Hemisphere), which roof aspect generally gives the best year-round solar generation?",
            options: ["North-facing", "South-facing", "East-facing", "West-facing"],
            answer: 0,
            explain: "In the Southern Hemisphere the sun tracks across the northern sky, so north-facing panels capture the most energy across the year. East/west splits can suit households that use more power in the morning and evening."
          },
          {
            q: "A pitched roof in Sydney (latitude ≈ 34°S). What tilt angle is broadly optimal for annual output?",
            options: ["0° (dead flat)", "About 30–35°", "60°", "90° (vertical)"],
            answer: 1,
            explain: "A tilt close to the site's latitude (~34° for Sydney) maximises annual yield. Most tiled/Colorbond roofs already sit near this, so panels are usually mounted flush to the roof pitch."
          },
          {
            q: "During the site visit you spot a tree shading part of the roof each afternoon. Best response?",
            options: [
              "Do a shading analysis and design the array/string layout around it (optimisers or micro-inverters help)",
              "Ignore it — panels still make some power in shade",
              "Pack the shaded area with panels anyway to fill the roof",
              "Recommend removing every tree on the block"
            ],
            answer: 0,
            explain: "Even partial shade on one panel can drag down a whole series string. Assess shading (e.g. with a tool/app), avoid heavily shaded zones, and use module-level electronics (optimisers/micro-inverters) where needed."
          },
          {
            q: "Before anyone climbs onto the roof, what must be confirmed first?",
            options: [
              "Roof structural integrity plus a safe access and fall-protection plan",
              "The colour of the roof tiles",
              "Mobile reception on the roof",
              "Nothing — just get up there and start"
            ],
            answer: 0,
            explain: "Working at heights is high-risk. SafeWork NSW requires fall protection (anchors, harness/edge protection) and you must verify the roof can carry the load and the crew safely."
          }
        ]
      },
      {
        type: "sizing",
        title: "System Sizing",
        intro: "The Nguyen household in Western Sydney uses about <b>20 kWh/day</b>. Sydney averages <b>~4.2 peak sun hours</b> and we assume a <b>0.8</b> performance ratio (losses from heat, wiring, inverter). Size the array and the battery.",
        controls: [
          { id: "panelKw", label: "☀️ Solar array size", min: 1, max: 10, step: 0.5, start: 3, unit: "kW", dp: 1 },
          { id: "batteryKwh", label: "🔋 Usable battery capacity", min: 0, max: 20, step: 1, start: 4, unit: "kWh", dp: 0 }
        ],
        compute(v) {
          const gen = v.panelKw * 4.2 * 0.8;
          const cover = Math.min(150, gen / 20 * 100);
          return {
            targets: { panelKw: [5.5, 7.5], batteryKwh: [10, 14] },
            readout:
              '<div>Estimated generation: <span class="big">' + gen.toFixed(1) + ' kWh/day</span></div>' +
              '<div class="muted" style="margin-top:4px">Household demand: 20 kWh/day · Daytime offset: <b>' + cover.toFixed(0) + '%</b></div>' +
              '<div class="bar"><span style="width:' + (gen/20*100).toFixed(0) + '%"></span></div>',
            tip: "A ~6 kW array makes roughly 20 kWh/day in Sydney (6 × 4.2 × 0.8 ≈ 20). A 10–14 kWh battery stores enough daytime surplus to carry the evening and overnight load — without paying for capacity you'll rarely fill."
          };
        }
      },
      {
        type: "order",
        title: "Wire It Up Safely",
        intro: "Arrange the grid-connected PV system from the panels through to the grid, following the energy path used under AS/NZS 5033 &amp; 4777.",
        items: [
          "Solar PV array (modules)",
          "Rooftop DC isolator",
          "Solar inverter",
          "AC isolator",
          "Main switchboard (solar supply main switch)",
          "Meter & grid connection"
        ],
        explain: "DC from the panels passes through a rooftop DC isolator to the inverter, which converts it to AC. That AC runs through an AC isolator to the switchboard (with its own solar main switch) and out to the meter/grid. Isolators each side of the inverter let you safely de-energise for service."
      },
      {
        type: "quiz",
        title: "Standards & Compliance",
        questions: [
          {
            q: "Which Australian/NZ Standard covers the installation and safety of PV arrays?",
            options: ["AS/NZS 5033", "ISO 9001", "AS/NZS 1768", "There is no standard"],
            answer: 0,
            explain: "AS/NZS 5033 is the installation and safety standard for PV arrays. It works alongside AS/NZS 4777 (inverter grid connection), AS/NZS 5139 (batteries) and AS/NZS 3000 (the Wiring Rules)."
          },
          {
            q: "For a grid-connected system to be eligible for STC rebates, the install must be done/supervised by an installer accredited by…",
            options: [
              "The Clean Energy Council / Solar Accreditation Australia (SAA)",
              "The local council mayor",
              "Nobody — accreditation isn't required",
              "The panel manufacturer's marketing team"
            ],
            answer: 0,
            explain: "Small-scale Technology Certificates (STCs) require an accredited installer (CEC / Solar Accreditation Australia) and CEC-approved components. No accreditation = no rebate and likely non-compliant work."
          },
          {
            q: "Before working on the DC side of the array, the correct safe procedure is to…",
            options: [
              "Isolate, lock out / tag out, then test to verify it's de-energised before touching",
              "Work fast so you're exposed for less time",
              "Only switch off the AC side and assume DC is safe",
              "Put on sunglasses and hope for the best"
            ],
            answer: 0,
            explain: "Always isolate, apply lock-out/tag-out, and 'test before you touch'. Remember PV arrays are live whenever there's daylight — you can't switch the sun off, so isolation and verification are essential."
          },
          {
            q: "A home battery (e.g. a wall-mounted lithium system) must be installed in line with which standard?",
            options: ["AS/NZS 5139", "AS/NZS 5033 only", "AS/NZS 4777 only", "No standard applies to batteries"],
            answer: 0,
            explain: "AS/NZS 5139 covers the safety and installation of battery energy storage systems — including location, clearances and signage. Battery placement near living spaces and exits is tightly controlled."
          }
        ]
      }
    ]
  },
  {
    title: "Home GPU Cluster",
    icon: "🖥️",
    badge: { em: "🖥️", name: "Cluster Commander" },
    stages: [
      {
        type: "quiz",
        title: "Choose Your Hardware",
        questions: [
          {
            q: "For running large AI models locally, which GPU spec usually matters most?",
            options: [
              "VRAM (video memory) capacity",
              "The colour and RGB lighting of the cooler",
              "The length of the power cable",
              "How many USB ports the card has"
            ],
            answer: 0,
            explain: "Model weights and activations have to fit in VRAM. More VRAM lets you load bigger models (or longer context) without spilling to slow system RAM. Memory bandwidth matters too, but capacity is the first hard limit."
          },
          {
            q: "You want four GPUs in a single node. Which motherboard feature matters most?",
            options: [
              "Enough PCIe slots/lanes with adequate physical spacing",
              "Built-in Wi-Fi",
              "Lots of RGB headers",
              "The number of SATA ports"
            ],
            answer: 0,
            explain: "Multi-GPU nodes need enough PCIe lanes and slot spacing (often workstation/server boards, or risers). Cramming thick cards together starves them of airflow and lanes."
          },
          {

/* ---------------- State ---------------- */
const state = { moduleIndex: 0, stageIndex: 0, score: 0, completed: 0, earnedBadges: [] };
let totalStages = 0, totalMax = 0;
function stageMax(s) { return s.type === 'quiz' ? s.questions.length * 100 : 100; }
MODULES.forEach(m => m.stages.forEach(s => { totalStages++; totalMax += stageMax(s); }));

function updateHeader(showScore) {
  scoreVal.textContent = state.score;
  scoreChip.hidden = !showScore;
  progFill.style.width = (state.completed / totalStages * 100) + '%';
}

/* ---------------- Helpers ---------------- */
function shuffle(a) {
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const LETTERS = ["A", "B", "C", "D", "E", "F"];

function advanceStage() {
  state.completed++;
  state.stageIndex++;
  const mod = MODULES[state.moduleIndex];
  if (state.stageIndex >= mod.stages.length) {
    if (!state.earnedBadges.includes(mod.badge.name)) state.earnedBadges.push(mod.badge.name);
    renderModuleComplete(mod);
  } else {
    renderStage();
  }
  updateHeader(true);
}

function renderHome() {

/* ---------------- Stage dispatch ---------------- */
function renderStage() {
  const mod = MODULES[state.moduleIndex];
  const stage = mod.stages[state.stageIndex];
  stageLabel.textContent = "Module " + (state.moduleIndex + 1) + " · " + mod.title + " — " + stage.title;
  if (stage.type === 'quiz') return renderQuiz(mod, stage);
  if (stage.type === 'order') return renderOrder(mod, stage);
  if (stage.type === 'sizing') return renderSizing(mod, stage);
}

/* ---------------- Quiz ---------------- */
function renderQuiz(mod, stage) {
  let qi = 0;
  function draw() {
    const q = stage.questions[qi];
    screen.innerHTML =
      '<div class="card">' +
        '<div class="stage-tag">' + mod.icon + ' ' + mod.title + ' · ' + stage.title + '</div>' +
        '<div class="q-progress">Question ' + (qi + 1) + ' of ' + stage.questions.length + '</div>' +
        '<h2 class="q-text">' + q.q + '</h2>' +
        '<div class="options">' +
          q.options.map((o, i) => '<button class="option" data-i="' + i + '"><span class="key">' + LETTERS[i] + '</span><span>' + o + '</span></button>').join('') +
        '</div>' +
        '<div class="feedback" id="fb" hidden></div>' +
        '<div class="row-end"><button class="btn-primary" id="nextBtn" hidden>' + (qi < stage.questions.length - 1 ? 'Next question →' : 'Finish stage →') + '</button></div>' +
      '</div>';
    const fb = screen.querySelector('#fb');
    const nextBtn = screen.querySelector('#nextBtn');
    let answered = false;
    const opts = Array.from(screen.querySelectorAll('.option'));
    opts.forEach(btn => btn.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      const i = +btn.dataset.i;
      const correct = i === q.answer;
      if (correct) { state.score += 100; btn.classList.add('correct'); }
      else { btn.classList.add('wrong'); opts[q.answer].classList.add('correct'); }
      opts.forEach(b => b.disabled = true);
      fb.hidden = false;
      fb.className = 'feedback ' + (correct ? 'ok' : 'bad');
      fb.innerHTML = '<strong>' + (correct ? '✅ Correct! ' : '❌ Not quite. ') + '</strong>' + q.explain;
      nextBtn.hidden = false;
      updateHeader(true);
    }));
    nextBtn.addEventListener('click', () => {
      qi++;
      if (qi < stage.questions.length) draw();
      else advanceStage();
    });
  }
  draw();
}

/* ---------------- Order ---------------- */
function renderOrder(mod, stage) {
  const correct = stage.items;
  const n = correct.length;
  let bank = shuffle(correct.map((t, i) => ({ t, pos: i })));
  let slots = new Array(n).fill(null);
  let checked = false;

  function draw() {
    screen.innerHTML =
      '<div class="card">' +
        '<div class="stage-tag">' + mod.icon + ' ' + mod.title + ' · ' + stage.title + '</div>' +
        '<p class="lede">' + stage.intro + '</p>' +
        '<div class="group-label">Your sequence (top → bottom)</div>' +
        '<div class="slots" id="slots"></div>' +
        '<div class="group-label">Available steps — tap to place</div>' +
        '<div class="bank" id="bank"></div>' +
        '<div class="feedback" id="fb" hidden></div>' +
        '<div class="row-between" style="margin-top:18px">' +
          '<button class="btn-ghost" id="resetBtn">↺ Reset</button>' +
          '<div style="display:flex;gap:10px">' +
            '<button class="btn-primary" id="checkBtn">Check order</button>' +
            '<button class="btn-primary" id="contBtn" hidden>Continue →</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    paint();
    screen.querySelector('#resetBtn').addEventListener('click', () => {
      if (checked) return;
      bank = shuffle(correct.map((t, i) => ({ t, pos: i })));
      slots = new Array(n).fill(null);
      paint();
    });
    screen.querySelector('#checkBtn').addEventListener('click', check);
    screen.querySelector('#contBtn').addEventListener('click', advanceStage);
  }

  function paint() {
    const slotsEl = screen.querySelector('#slots');
    const bankEl = screen.querySelector('#bank');
    slotsEl.innerHTML = slots.map((s, i) => {
      let cls = 'slot' + (s ? ' filled' : '');
      if (checked && s) cls += (s.pos === i ? ' ok' : ' no');
      const inner = s
        ? '<button class="chip-item" data-slot="' + i + '">' + s.t + (checked ? (s.pos === i ? ' ✓' : ' ✗') : '') + '</button>'
        : '<span class="muted">Tap a step below…</span>';
      return '<div class="' + cls + '"><span class="num">' + (i + 1) + '</span>' + inner + '</div>';
    }).join('');
    bankEl.innerHTML = bank.length
      ? bank.map((b, i) => '<button class="chip-item" data-bank="' + i + '">' + b.t + '</button>').join('')
      : '<span class="muted">All steps placed.</span>';
    if (!checked) {
      bankEl.querySelectorAll('[data-bank]').forEach(btn => btn.addEventListener('click', () => {
        const idx = +btn.dataset.bank;
        const free = slots.indexOf(null);
        if (free === -1) return;
        slots[free] = bank[idx];
        bank.splice(idx, 1);
        paint();
      }));
      slotsEl.querySelectorAll('[data-slot]').forEach(btn => btn.addEventListener('click', () => {
        const idx = +btn.dataset.slot;
        bank.push(slots[idx]);
        slots[idx] = null;
        paint();
      }));
    }
  }

  function check() {
    if (slots.includes(null)) {
      const fb = screen.querySelector('#fb');
      fb.hidden = false; fb.className = 'feedback bad';
      fb.innerHTML = '<strong>Fill every slot first.</strong> Place all the steps before checking.';
      return;
    }
    checked = true;
    let right = 0;
    slots.forEach((s, i) => { if (s.pos === i) right++; });
    const earned = Math.round(100 * right / n);
    state.score += earned;
    paint();
    const fb = screen.querySelector('#fb');
    fb.hidden = false;
    fb.className = 'feedback ' + (right === n ? 'ok' : 'bad');
    fb.innerHTML = '<strong>' + (right === n ? '✅ Perfect sequence! ' : '⚠️ ' + right + ' of ' + n + ' in the right spot. ') + '</strong>' + stage.explain + ' <em>(+' + earned + ' pts)</em>';
    screen.querySelector('#checkBtn').hidden = true;
    screen.querySelector('#resetBtn').disabled = true;
    screen.querySelector('#contBtn').hidden = false;
    updateHeader(true);
  }

  draw();
}

/* ---------------- Sizing ---------------- */
function renderSizing(mod, stage) {
  const vals = {};
  stage.controls.forEach(c => vals[c.id] = c.start);
  let checked = false;

  function fmt(c) { return (+vals[c.id]).toFixed(c.dp) + ' ' + c.unit; }

  function draw() {
    screen.innerHTML =
      '<div class="card">' +
        '<div class="stage-tag">' + mod.icon + ' ' + mod.title + ' · ' + stage.title + '</div>' +
        '<p class="lede">' + stage.intro + '</p>' +
        stage.controls.map(c =>
          '<div class="control">' +
            '<div class="lab"><span class="name">' + c.label + '</span><span class="val" id="val-' + c.id + '">' + fmt(c) + '</span></div>' +
            '<input type="range" id="rng-' + c.id + '" min="' + c.min + '" max="' + c.max + '" step="' + c.step + '" value="' + c.start + '">' +
            '<div class="target-hint" id="hint-' + c.id + '" hidden></div>' +
          '</div>'
        ).join('') +
        '<div class="readout" id="readout"></div>' +
        '<div class="feedback" id="fb" hidden></div>' +
        '<div class="row-end">' +
          '<button class="btn-primary" id="checkBtn">Lock in design</button>' +
          '<button class="btn-primary" id="contBtn" hidden>Continue →</button>' +
        '</div>' +
      '</div>';
    stage.controls.forEach(c => {
      const rng = screen.querySelector('#rng-' + c.id);
      rng.addEventListener('input', () => {
        vals[c.id] = +rng.value;
        screen.querySelector('#val-' + c.id).textContent = fmt(c);
        liveUpdate();
      });
    });
    screen.querySelector('#checkBtn').addEventListener('click', check);
    screen.querySelector('#contBtn').addEventListener('click', advanceStage);
    liveUpdate();
  }

  function liveUpdate() {
    const r = stage.compute(vals);
    screen.querySelector('#readout').innerHTML = r.readout;
    return r;
  }

  function check() {
    const r = stage.compute(vals);
    const targets = r.targets;
    const keys = Object.keys(targets);
    let inRange = 0;
    checked = true;
    keys.forEach(k => {
      const c = stage.controls.find(x => x.id === k);
      const [lo, hi] = targets[k];
      const ok = vals[k] >= lo && vals[k] <= hi;
      if (ok) inRange++;
      const hint = screen.querySelector('#hint-' + k);
      hint.hidden = false;
      hint.className = 'target-hint ' + (ok ? 'ok' : 'no');
      hint.textContent = (ok ? '✓ In the ideal range' : '✗ Aim for') + ' ' + (+lo).toFixed(c.dp) + '–' + (+hi).toFixed(c.dp) + ' ' + c.unit;
    });
    const earned = Math.round(100 * inRange / keys.length);
    state.score += earned;
    const fb = screen.querySelector('#fb');
    fb.hidden = false;
    fb.className = 'feedback ' + (inRange === keys.length ? 'ok' : 'bad');
    const head = inRange === keys.length ? '✅ Well sized! ' : '⚠️ ' + inRange + ' of ' + keys.length + ' in the ideal range. ';
    fb.innerHTML = '<strong>' + head + '</strong>' + r.tip + ' <em>(+' + earned + ' pts)</em>';
    screen.querySelector('#checkBtn').hidden = true;
    screen.querySelector('#contBtn').hidden = false;
    stage.controls.forEach(c => { screen.querySelector('#rng-' + c.id).disabled = true; });
    updateHeader(true);
  }

  draw();
}
